name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# No cancelar un deploy en progreso: evita dejar Pages en estado fallido.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: https://oscaromargp.github.io
      PUBLIC_BASE_PATH: /couva-landing
      PUBLIC_N8N_WEBHOOK_URL: https://n8n.zxyw.site/webhook/couva-lead
      PUBLIC_CALENDAR_URL: https://calendar.app.google/T3QKi6h9VhtzSRDeA
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
